<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StegoSecure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to right, #f5576c, #e14e62);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🔒';
            position: absolute;
            font-size: 80px;
            opacity: 0.1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        .form-container {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e5ee;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: #f5576c;
            background: white;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #f5576c, #e14e62);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: linear-gradient(to right, #e14e62, #d1455a);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(to right, #6c757d, #5a6268);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: linear-gradient(to right, #5a6268, #495057);
            box-shadow: 0 10px 20px rgba(108, 117, 125, 0.3);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            font-size: 14px;
        }

        .links a {
            color: #f5576c;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #e14e62;
            text-decoration: underline;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 10px 0;
        }

        .loader::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f5576c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .admin-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 13px;
        }

        .admin-link a {
            color: #495057;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 15px;
            }
            
            .header {
                padding: 25px 20px;
            }
            
            .form-container {
                padding: 25px 20px;
            }
            
            .links {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 StegoSecure Login</h1>
            <p>Secure steganography for your secrets</p>
        </div>

        <div class="form-container">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your registered email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <div class="loader" id="loading"></div>

                <div class="message" id="message"></div>

                <button type="submit" class="btn" id="loginBtn">Login to Dashboard</button>

                <div class="links">
                    <a href="register.html">Create new account</a>
                    <a href="#" onclick="showForgotPassword()">Forgot password?</a>
                </div>

                <div class="admin-link">
                    Are you an admin? <a href="admin_login.html">Login to Admin Panel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check if user is already logged in
        window.addEventListener('load', () => {
            const userId = localStorage.getItem('user_id');
            if (userId) {
                window.location.href = 'index.html';
            }
            
            // Check backend
            checkBackend();
        });
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('message');
            const loadingEl = document.getElementById('loading');
            const loginBtn = document.getElementById('loginBtn');
            
            // Clear previous messages
            messageEl.className = 'message';
            messageEl.style.display = 'none';
            messageEl.textContent = '';
            
            // Validation
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            // Show loading
            loadingEl.style.display = 'block';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Authenticating...';
            
            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store user data in localStorage
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    
                    showSuccess('Login successful! Redirecting...');
                    
                    // Redirect to dashboard after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError('Invalid email or password. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please check if backend is running.');
            } finally {
                // Hide loading
                loadingEl.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login to Dashboard';
            }
        });
        
        function showSuccess(message) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = 'message success';
            messageEl.style.display = 'block';
        }
        
        function showError(message) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = 'message error';
            messageEl.style.display = 'block';
        }
        
        function showForgotPassword() {
            showError('Password recovery not implemented. Please contact administrator.');
        }
        
        async function checkBackend() {
            try {
                await fetch('http://localhost:5000/');
                console.log('Backend is reachable');
            } catch (error) {
                showError('⚠️ Backend server not running. Please start the Flask server first.');
            }
        }
    </script>
</body>
</html>
